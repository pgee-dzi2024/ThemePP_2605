<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Анализ на настроението (Sentiment Analysis)</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .result-box { display: none; margin-top: 30px; }
    </style>
</head>
<body>

<div class="container">
    <h1 class="text-center mb-4">Анализ на потребителски отзиви</h1>

    <div class="card shadow-sm">
        <div class="card-body">
            <form id="analyze-form">
                <!-- CSRF Token за сигурност при POST заявки -->
                {% csrf_token %}
                <div class="mb-3">
                    <label for="text-input" class="form-label">Въведете текст за анализ:</label>
                    <textarea class="form-control" id="text-input" rows="4" placeholder="Напр. Много съм доволен от продукта!" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100" id="submit-btn">Анализирай</button>
            </form>
        </div>
    </div>

    <!-- Секция за резултати -->
    <div class="row result-box" id="result-section">
        <div class="col-md-6 mb-3">
            <div class="card shadow-sm h-100">
                <div class="card-body text-center d-flex flex-column justify-content-center">
                    <h4 class="card-title">Краен резултат</h4>
                    <h2 id="sentiment-badge" class="badge bg-secondary p-3 fs-4 mt-3">Неутрален</h2>
                </div>
            </div>
        </div>
        <div class="col-md-6 mb-3">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <canvas id="sentimentChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let sentimentChart = null;

    document.getElementById('analyze-form').addEventListener('submit', async function(e) {
        e.preventDefault();

        const textInput = document.getElementById('text-input').value;
        const submitBtn = document.getElementById('submit-btn');
        const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

        submitBtn.disabled = true;
        submitBtn.innerText = 'Анализиране...';

        try {
            const response = await fetch('/api/analyze/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrfToken
                },
                body: JSON.stringify({ text: textInput })
            });

            if (!response.ok) throw new Error('Грешка при анализа');

            const data = await response.json();
            showResult(data.sentiment, data.scores);
        } catch (error) {
            alert('Възникна грешка: ' + error.message);
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = 'Анализирай';
        }
    });

    function showResult(sentiment, scores) {
        document.getElementById('result-section').style.display = 'flex';

        // Обновяване на баджа
        const badge = document.getElementById('sentiment-badge');
        let badgeColor = 'bg-secondary';
        let badgeText = 'Неутрален';

        if (sentiment === 'positive') {
            badgeColor = 'bg-success';
            badgeText = 'Позитивен';
        } else if (sentiment === 'negative') {
            badgeColor = 'bg-danger';
            badgeText = 'Негативен';
        }

        badge.className = `badge ${badgeColor} p-3 fs-4 mt-3`;
        badge.innerText = badgeText;

        // Обновяване на графиката
        updateChart(scores.positive, scores.neutral, scores.negative);
    }

    function updateChart(pos, neu, neg) {
        const ctx = document.getElementById('sentimentChart').getContext('2d');

        if (sentimentChart) {
            sentimentChart.destroy();
        }

        sentimentChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Позитивен', 'Неутрален', 'Негативен'],
                datasets: [{
                    label: 'Вероятност',
                    data: [pos, neu, neg],
                    backgroundColor: [
                        'rgba(25, 135, 84, 0.7)',  // success green
                        'rgba(108, 117, 125, 0.7)', // secondary grey
                        'rgba(220, 53, 69, 0.7)'    // danger red
                    ],
                    borderColor: [
                        'rgba(25, 135, 84, 1)',
                        'rgba(108, 117, 125, 1)',
                        'rgba(220, 53, 69, 1)'
                    ],
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: { beginAtZero: true, max: 1 }
                }
            }
        });
    }
</script>

</body>
</html>
